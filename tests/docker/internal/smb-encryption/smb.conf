[global]
server min protocol = SMB3_00
server max protocol = SMB3_11
# Global "desired" allows unencrypted session setup and tree connect.
# Share-level "desired" sets ENCRYPT_DATA flag in tree connect response,
# which triggers our client to activate encryption for subsequent traffic.
smb encrypt = desired
log level = 1

[private]
path = /shares/private
read only = no
valid users = testuser
browseable = yes
create mask = 0666
directory mask = 0777
smb encrypt = desired
