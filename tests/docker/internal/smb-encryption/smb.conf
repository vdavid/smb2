[global]
server min protocol = SMB3_00
server max protocol = SMB3_11
# "desired" means server supports encryption but doesn't require it.
# Our lib negotiates encryption ciphers but doesn't yet wrap messages
# in TRANSFORM_HEADER, so "required" would reject us.
smb encrypt = desired
log level = 1

[private]
path = /shares/private
read only = no
valid users = testuser
browseable = yes
create mask = 0666
directory mask = 0777
