[global]
server min protocol = SMB2_02
server max protocol = SMB3_11
map to guest = Bad User
log level = 1
# Force tiny read/write sizes to exercise chunking.
smb2 max read = 65536
smb2 max write = 65536
smb2 max trans = 65536

[public]
path = /shares/public
read only = no
guest ok = yes
browseable = yes
create mask = 0666
directory mask = 0777
