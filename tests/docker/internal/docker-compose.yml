services:
  smb-guest:
    build:
      context: smb-guest
    ports:
      - "10445:445"

  smb-auth:
    build:
      context: smb-auth
    ports:
      - "10446:445"

  smb-signing:
    build:
      context: smb-signing
    ports:
      - "10447:445"

  smb-readonly:
    build:
      context: smb-readonly
    ports:
      - "10448:445"

  smb-ancient:
    build:
      context: smb-ancient
    ports:
      - "10449:445"

  smb-flaky:
    build:
      context: smb-flaky
    ports:
      - "10450:445"

  smb-slow:
    build:
      context: smb-slow
    ports:
      - "10451:445"
    cap_add:
      - NET_ADMIN

  smb-encryption:
    build:
      context: smb-encryption
    ports:
      - "10452:445"

  smb-encryption-aes128:
    build:
      context: smb-encryption-aes128
    ports:
      - "10455:445"

  smb-50shares:
    build:
      context: smb-50shares
    ports:
      - "10453:445"

  smb-maxreadsize:
    build:
      context: smb-maxreadsize
    ports:
      - "10454:445"

  smb-dfs-root:
    build:
      context: smb-dfs-root
    ports:
      - "10456:445"

  smb-dfs-target:
    build:
      context: smb-dfs-target
    ports:
      - "10457:445"
