[global]
server role = standalone server
server string = Synology DS923+
server min protocol = SMB2_02
server max protocol = SMB3_11
map to guest = Bad User
log level = 1

[shared]
path = /shares/shared
read only = no
guest ok = yes
browseable = yes
create mask = 0666
directory mask = 0777

[TimeMachine]
path = /shares/timemachine
read only = no
guest ok = yes
browseable = yes
create mask = 0666
directory mask = 0777
