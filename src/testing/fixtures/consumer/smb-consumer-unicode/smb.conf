[global]
server role = standalone server
server min protocol = SMB2_02
server max protocol = SMB3_11
map to guest = Bad User
log level = 1
# `unix charset = UTF-8` is the Samba default on modern distros; listed here for
# clarity since this container is specifically about unicode support.
unix charset = UTF-8

[public]
path = /shares/public
read only = no
guest ok = yes
browseable = yes
create mask = 0666
directory mask = 0777

# Japanese share name ("public")
[公開]
path = /shares/kokai
read only = no
guest ok = yes
browseable = yes
create mask = 0666
directory mask = 0777

# Accented Latin share name
[café]
path = /shares/cafe
read only = no
guest ok = yes
browseable = yes
create mask = 0666
directory mask = 0777

# Chinese share name ("documents")
[文档]
path = /shares/wendang
read only = no
guest ok = yes
browseable = yes
create mask = 0666
directory mask = 0777
